<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis Notas Pro</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    max-width: 400px;
}

input, select {
    padding: 8px;
    margin: 5px 0;
    width: 100%;
}

button {
    padding: 8px;
    width: 100%;
    margin-top: 5px;
    cursor: pointer;
}

li {
    margin-top: 10px;
    padding: 8px;
    background: #eee;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
}
</style>
</head>

<body>

<div class="card">

<h2>📝 Mis Notas Pro</h2>

<input id="noteInput" placeholder="Escribe una nota..." />

<select id="category">
    <option>General</option>
    <option>Trabajo</option>
    <option>Estudio</option>
    <option>Personal</option>
</select>

<button onclick="addNote()">Agregar</button>

<ul id="notesList"></ul>

</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

function renderNotes() {
    const list = document.getElementById("notesList");
    list.innerHTML = "";

    notes.forEach((note, i) => {
        list.innerHTML += `
            <li>
                <span>[${note.category}] ${note.text}</span>
                <button onclick="deleteNote(${i})">X</button>
            </li>
        `;
    });

    localStorage.setItem("notes", JSON.stringify(notes));
}

function addNote() {
    let text = document.getElementById("noteInput").value;
    let category = document.getElementById("category").value;

    if (text.trim() !== "") {
        notes.push({ text, category });
        document.getElementById("noteInput").value = "";
        renderNotes();
    }
}

function deleteNote(i) {
    notes.splice(i, 1);
    renderNotes();
}

renderNotes();
</script>

</body>
</html>
