<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi App de Notas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px;
            margin-left: 5px;
            cursor: pointer;
        }

        li {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h2>📝 Mis notas</h2>

<input id="noteInput" placeholder="Escribe una nota..." />
<button onclick="addNote()">Agregar</button>

<ul id="notesList"></ul>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

function renderNotes() {
    const list = document.getElementById("notesList");
    list.innerHTML = "";

    notes.forEach((note, index) => {
        list.innerHTML += `
            <li>
                ${note}
                <button onclick="deleteNote(${index})">❌</button>
            </li>
        `;
    });

    localStorage.setItem("notes", JSON.stringify(notes));
}

function addNote() {
    const input = document.getElementById("noteInput");

    if (input.value.trim() !== "") {
        notes.push(input.value);
        input.value = "";
        renderNotes();
    }
}

function deleteNote(index) {
    notes.splice(index, 1);
    renderNotes();
}

// cargar al inicio
renderNotes();
</script>

</body>
</html>
