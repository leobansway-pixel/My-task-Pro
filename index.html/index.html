<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MyTaskPro AI Startup</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #eef5ff;
    padding: 20px;
}

h2 {
    text-align: center;
}

.top {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

input {
    flex: 1;
    padding: 10px;
}

button {
    padding: 10px;
    background: #0096c7;
    color: white;
    border: none;
    border-radius: 8px;
}

.container {
    display: flex;
    gap: 10px;
}

.column {
    flex: 1;
    background: white;
    padding: 10px;
    border-radius: 10px;
    min-height: 300px;
}

.task {
    background: #dff3ff;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    cursor: grab;
}

.progress {
    margin-top: 10px;
    background: #ccc;
    height: 10px;
    border-radius: 5px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: green;
}

.calendar {
    margin-top: 15px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
}

.day {
    background: white;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2>🧠 MyTaskPro AI Startup MVP</h2>

<div class="top">
    <input id="taskInput" placeholder="Escribe tarea...">
    <button onclick="addTask()">➕</button>
    <button onclick="voice()">🎤 Voz</button>
    <button onclick="generatePlan()">🧠 IA Plan</button>
</div>

<div class="progress">
    <div class="bar" id="bar"></div>
</div>

<div class="container">
    <div class="column" id="todo">
        <h3>📌 Pendiente</h3>
    </div>

    <div class="column" id="doing">
        <h3>⚡ En progreso</h3>
    </div>

    <div class="column" id="done">
        <h3>✅ Hecho</h3>
    </div>
</div>

<div class="calendar">
    <div class="day">
        <h3>Mañana</h3>
        <div id="morning"></div>
    </div>

    <div class="day">
        <h3>Tarde</h3>
        <div id="afternoon"></div>
    </div>

    <div class="day">
        <h3>Noche</h3>
        <div id="night"></div>
    </div>
</div>

<script>

let tasks = [];

/* ➕ TASK */
function addTask() {
    let text = taskInput.value;
    if(!text) return;

    let div = document.createElement("div");
    div.className = "task";
    div.innerText = text;

    document.getElementById("todo").appendChild(div);
    tasks.push(text);

    taskInput.value = "";
    enableDrag();
    updateProgress();
}

/* 🧲 DRAG & DROP */
function enableDrag() {
    document.querySelectorAll(".column").forEach(col=>{
        new Sortable(col, {
            group: "shared",
            animation: 150
        });
    });
}

/* 🧠 IA PLANNER REAL */
async function generatePlan() {

    const prompt = `
Organiza estas tareas en un horario diario:

${tasks.join("\n")}

Devuelve SOLO JSON:
{
 "mañana": [],
 "tarde": [],
 "noche": []
}
`;

    const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer TU_API_KEY"
        },
        body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
                { role: "system", content: "Eres un planner de productividad." },
                { role: "user", content: prompt }
            ]
        })
    });

    const data = await res.json();

    let plan = JSON.parse(data.choices[0].message.content);

    document.getElementById("morning").innerHTML = plan.mañana.map(t=>"• "+t).join("<br>");
    document.getElementById("afternoon").innerHTML = plan.tarde.map(t=>"• "+t).join("<br>");
    document.getElementById("night").innerHTML = plan.noche.map(t=>"• "+t).join("<br>");

    notify("🧠 IA creó tu día");
}

/* 🎤 VOZ */
function voice() {
    let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = "es-ES";

    rec.onresult = e => {
        let text = e.results[0][0].transcript;

        if(text.includes("organiza mi día")) {
            generatePlan();
        } else {
            taskInput.value = text;
            addTask();
        }
    };

    rec.start();
}

/* 📊 PROGRESO */
function updateProgress() {
    let total = tasks.length;
    let done = document.getElementById("done").children.length - 1;

    let percent = total ? (done / total) * 100 : 0;

    document.getElementById("bar").style.width = percent + "%";
}

/* 🔔 NOTIFICACIONES */
function notify(msg) {
    if(Notification.permission === "granted") {
        new Notification(msg);
    } else {
        Notification.requestPermission();
    }
}

/* ⏰ ALERTAS SIMPLES */
setInterval(()=>{
    let h = new Date().getHours();

    if(h === 9) notify("🌅 Empieza tu día");
    if(h === 15) notify("⚡ Revisa tus tareas");
    if(h === 21) notify("🌙 Cierra tu día");
}, 60000);

</script>

</body>
</html>
