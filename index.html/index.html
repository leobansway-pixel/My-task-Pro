<body>

<div class="container">

<h2>📝 Mis Notas Pro</h2>

<div class="card">

<input id="noteInput" placeholder="Escribe una nota..." />

<select id="category">
    <option>General</option>
    <option>Trabajo</option>
    <option>Estudio</option>
    <option>Personal</option>
</select>

<button onclick="addNote()">Agregar Nota</button>

<input class="search" id="search" placeholder="Buscar nota..." onkeyup="renderNotes()" />

<ul id="notesList"></ul>

</div>

</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

function renderNotes() {
    const list = document.getElementById("notesList");
    const search = document.getElementById("search").value.toLowerCase();

    list.innerHTML = "";

    notes
    .filter(n => n.text.toLowerCase().includes(search))
    .forEach((note, i) => {
        list.innerHTML += `
            <li>
                <div>
                    <b>[${note.category}]</b>
                    <small>${note.text}</small>
                </div>
                <button onclick="deleteNote(${i})">❌</button>
            </li>
        `;
    });

    localStorage.setItem("notes", JSON.stringify(notes));
}

function addNote() {
    let text = document.getElementById("noteInput").value;
    let category = document.getElementById("category").value;

    if (text.trim() !== "") {
        notes.push({ text, category });
        document.getElementById("noteInput").value = "";
        renderNotes();
    }
}

function deleteNote(i) {
    notes.splice(i, 1);
    renderNotes();
}

// 🔥 ENTER para agregar nota
document.getElementById("noteInput").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        addNote();
    }
});

renderNotes();
</script>

</body>
